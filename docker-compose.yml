services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data


  s3viewer:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"
    depends_on:
      - minio
    ports:
      - "8080:8080"

volumes:
  minio-data:
